version: '3.8'

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: car-rental-app
    restart: unless-stopped
    ports:
      - "3000:8000"
    volumes:
      - ./backend:/var/www
    depends_on:
      db:
        condition: service_healthy
    networks:
      - car-rental-network

  db:
    image: postgres:15-alpine
    container_name: car-rental-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: car_rental
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d car_rental"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - car-rental-network

networks:
  car-rental-network:
    driver: bridge

volumes:
  pgdata:
