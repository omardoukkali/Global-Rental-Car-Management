version: '3.8'

services:
  web:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      target: web
    ports:
      - "8888:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - storage-data:/var/www/html/storage/app
    depends_on:
      - app

  app:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      target: app
    environment:
      - APP_KEY=base64:IDT5i60KTH+KD4eLvoHylECMpd5JXqhnLG/KRqMyBIE=
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=globalrental
      - DB_USERNAME=grader
      - DB_PASSWORD=secret
    volumes:
      - storage-data:/var/www/html/storage/app
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=globalrental
      - POSTGRES_USER=grader
      - POSTGRES_PASSWORD=secret
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
  storage-data:
